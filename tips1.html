<!DOCTYPE html>
<html lang="hy">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8567583688178652"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Ինչպե՞ս սկսել խնայել զրոյից - FinSmart Armenia</title>

    <style>
        :root { 
            --gold: #d4af37; 
            --dark: #1a1a1a; 
            --white: #ffffff; 
            --bg: #f4f7f6; 
            --text: #333;
            --soft-gold: #fffcf0;
            --card-bg: white;
        }

        body.dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --card-bg: #1e1e1e;
            --soft-gold: #252525;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 0; 
            color: var(--text); 
            line-height: 1.8; 
            transition: background 0.3s, color 0.3s;
        }
        
        header { 
            background: var(--dark); 
            color: white; 
            text-align: center; 
            padding: 60px 20px; 
            border-bottom: 5px solid var(--gold); 
            position: relative;
        }

        .achievement-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
            background: rgba(212, 175, 55, 0.15);
            padding: 10px 15px;
            border-radius: 50px;
            border: 1px solid var(--gold);
            align-items: center;
            gap: 10px;
            animation: bounceIn 1s ease;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            z-index: 105;
        }
        .achievement-badge span { color: var(--gold); font-weight: bold; font-size: 13px; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        .logo-container {
            position: absolute;
            top: 10px;
            left: 20px;
            cursor: pointer;
            z-index: 110;
        }

        .logo-svg { height: 65px; width: auto; }

        .settings-menu {
            display: none;
            position: absolute;
            top: 75px;
            left: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 100;
            width: 200px;
            overflow: hidden;
            border: 1px solid var(--gold);
            line-height: 1.4;
        }

        .settings-menu.show { display: block; animation: fadeIn 0.3s ease; }

        .settings-menu h4 {
            margin: 0; padding: 10px; font-size: 11px;
            text-transform: uppercase; color: var(--gold);
            background: rgba(0,0,0,0.05); text-align: left;
        }

        .settings-menu button, .settings-menu a {
            display: block; width: 100%; padding: 12px 15px;
            color: var(--text); text-decoration: none; font-size: 14px;
            background: none; border: none; text-align: left;
            cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: 0.2s;
            box-sizing: border-box;
        }

        .settings-menu button:hover, .settings-menu a:hover { background: var(--gold); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 { margin: 15px 0 0; font-size: 28px; }
        header p { margin: 5px 0 0; opacity: 0.8; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        .article-content { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        .back-link { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: var(--gold); 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .back-link:hover { color: var(--dark); transform: translateX(-5px); }

        h1.post-title { color: var(--dark); font-size: 32px; margin-bottom: 20px; line-height: 1.3; }
        body.dark-mode h1.post-title { color: var(--gold); }

        .intro { 
            font-size: 18px; color: #555; font-style: italic; 
            border-left: 4px solid var(--gold); padding-left: 20px; margin: 20px 0;
        }
        body.dark-mode .intro { color: #bbb; }

        h2 { 
            color: var(--dark); margin-top: 30px; font-size: 24px; 
            border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px;
        }
        body.dark-mode h2 { color: var(--white); }

        .highlight-box {
            background: var(--soft-gold);
            border: 1px solid var(--gold);
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            color: var(--text);
        }

        .step-card {
            background: var(--card-bg);
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 35px; border-radius: 15px; max-width: 350px; text-align: center; border-top: 6px solid var(--gold); position: relative; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text); }
        .calc-btn { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        footer { background: var(--dark); color: white; text-align: center; padding: 30px; margin-top: 50px; }
        footer a { color: var(--gold); text-decoration: none; }

        @media (max-width: 600px) {
            header { padding: 90px 20px 30px; }
            .logo-container { left: 50%; transform: translateX(-50%); top: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div id="achievementBadge" class="achievement-badge">
        <span id="badgeText"></span>
    </div>

    <div class="logo-container" onclick="toggleLogoMenu()">
        <svg class="logo-svg" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="rgb(26,26,26)"/>
            <g transform="translate(80, 50)">
              <rect x="0" y="55" width="16" height="30" rx="2" fill="white"/>
              <rect x="25" y="40" width="16" height="45" rx="2" fill="white"/>
              <rect x="50" y="20" width="16" height="65" rx="2" fill="white"/>
              <rect x="75" y="0" width="16" height="85" rx="2" fill="white"/>
              <path d="M -20 70 Q 30 110 95 65" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
              <path d="M -10 85 Q 40 65 90 5" stroke="#d4af37" stroke-width="6" fill="none" stroke-linecap="round"/>
              <path d="M 82 12 L 95 0 L 100 18 Z" fill="#d4af37"/>
            </g>
            <text x="200" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="60" fill="white">
              Fin<tspan fill="#d4af37">Smart</tspan>
            </text>
            <g transform="translate(200, 150)">
              <line x1="0" y1="-5" x2="60" y2="-5" stroke="#999" stroke-width="2"/>
              <text x="135" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#999" letter-spacing="5">ARMENIA</text>
              <line x1="210" y1="-5" x2="270" y2="-5" stroke="#999" stroke-width="2"/>
            </g>
        </svg>
    </div>

    <div id="logoMenu" class="settings-menu">
        <h4 data-key="menu_user">Օգտատեր</h4>
        <button onclick="showUserData()" data-key="menu_my_data">👤 ԻՄ ՏՎՅԱԼՆԵՐԸ</button>
        <h4 data-key="menu_lang">Լեզու / Language</h4>
        <button onclick="changeLang('am')">🇦🇲 ARMENIAN</button>
        <button onclick="changeLang('ru')">🇷🇺 RUSSIAN</button>
        <button onclick="changeLang('en')">🇺🇸 ENGLISH</button>
        <h4 data-key="menu_settings">Կարգավորումներ</h4>
        <button onclick="toggleDarkMode()" data-key="menu_night_mode">🌙 Գիշերային ռեժիմ</button>
        <a href="terms.html" data-key="menu_terms">📜 Օգտագործման պայմաններ</a>
    </div>

    <h1>FinSmart Armenia</h1>
    <p id="mainSub">Կառավարեք ձեր ֆինանսները խելացի տարբերակով</p>
</header>

<div class="container">
    <a href="index.html" class="back-link" id="backBtn">← Վերադառնալ հաշվիչին</a>

    <article class="article-content" id="articleBody">
    </article>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3 data-key="reg_title">📥 Գրանցում</h3>
        <form id="regForm">
            <input type="text" id="userName" placeholder="Անուն" data-placeholder="reg_name_ph" required>
            <input type="email" id="userEmail" placeholder="Էլ. հասցե" data-placeholder="reg_email_ph" required>
            <button type="submit" class="calc-btn" data-key="btn_save">Պահպանել</button>
        </form>
        <button onclick="closeModal('regModal')" style="background:none; color:gray; margin-top:15px; border:none; cursor:pointer;" data-key="btn_close">Փակել</button>
    </div>
</div>

<div id="userDataModal" class="modal">
    <div class="modal-content">
        <h3 data-key="my_data_title">👤 Իմ Տվյալները</h3>
        <div id="userDataContent" style="background: rgba(0,0,0,0.05); padding:15px; border-radius:8px; margin:15px 0; text-align:left;"></div>
        <button onclick="closeModal('userDataModal')" class="calc-btn" data-key="btn_ok">Լավ</button>
        <div id="dynamicActionBtn"></div>
    </div>
</div>

<footer>
    &copy; 2026 FinSmart Armenia | <a href="privacy.html" data-key="privacy">Գաղտնիություն</a>
</footer>

<script>
    const translations = {
        am: {
            mainSub: "Կառավարեք ձեր ֆինանսները խելացի տարբերակով",
            back: "← Վերադառնալ հաշվիչին",
            menu_user: "Օգտատեր",
            menu_my_data: "👤 ԻՄ ՏՎՅԱԼՆԵՐԸ",
            menu_lang: "Լեզու / Language",
            menu_settings: "Կարգավորումներ",
            menu_night_mode: "🌙 Գիշերային ռեժիմ",
            menu_terms: "📜 Օգտագործման պայմաններ",
            privacy: "Գաղտնիություն",
            reg_title: "📥 Գրանցում",
            reg_name_ph: "Անուն",
            reg_email_ph: "Էլ. հասցե",
            btn_save: "Պահպանել",
            btn_close: "Փակել",
            my_data_title: "👤 Իմ Տվյալները",
            btn_ok: "Լավ",
            btn_clear: "Ջնջել ամբողջը",
            levels: ["Սկսնակ 🥉", "Խնայող 🥈", "Ֆինանսական Վարպետ 🥇", "Լեգենդար Հաղթող 🏆"],
            content: `
                <h1 class="post-title">💰 Ինչպե՞ս սկսել խնայել զրոյից — Գործնական ուղեցույց</h1>
                <p class="intro">Շատերը կարծում են, թե խնայելը հնարավոր է միայն մեծ եկամուտ ունենալու դեպքում։ Իրականում դա սովորություն է, որը կարելի է զարգացնել ցանկացած բյուջեով:</p>
                <div class="step-card">
                    <h2>Քայլ 1. Ծախսերի մանրակրկիտ վերահսկում</h2>
                    <p>Առաջին քայլը ֆինանսական աուդիտն է։ Մեկ ամսվա ընթացքում գրանցիր բոլոր ծախսերդ, նույնիսկ ամենափոքր գնումները։</p>
                </div>
                <div class="step-card">
                    <h2>Քայլ 2. 50/30/20 կանոնի կիրառումը</h2>
                    <p>Սա ամենաարդյունավետ բանաձևն է. եկամտի 50%-ը ուղղեք կարիքներին, 30%-ը՝ ցանկություններին, իսկ 20%-ը՝ խնայողությանը:</p>
                </div>
            `
        },
        ru: {
            mainSub: "Управляйте финансами с умом",
            back: "← Вернуться к калькулятору",
            menu_user: "Пользователь",
            menu_my_data: "👤 МОИ ДАННЫЕ",
            menu_lang: "Язык / Language",
            menu_settings: "Настройки",
            menu_night_mode: "🌙 Ночной режим",
            menu_terms: "📜 Условия использования",
            privacy: "Конфиденциальность",
            reg_title: "📥 Регистрация",
            reg_name_ph: "Имя",
            reg_email_ph: "Эл. почта",
            btn_save: "Сохранить",
            btn_close: "Закрыть",
            my_data_title: "👤 Мои данные",
            btn_ok: "Ок",
            btn_clear: "Удалить всё",
            levels: ["Новичок 🥉", "Экономный 🥈", "Мастер Финансов 🥇", "Легендарный Победитель 🏆"],
            content: `
                <h1 class="post-title">💰 Как начать копить с нуля — Практическое руководство</h1>
                <p class="intro">Многие ошибочно полагают, что копить можно только при огромных доходах. Это полезная финансовая привычка.</p>
                <div class="step-card">
                    <h2>Шаг 1. Контроль расходов</h2>
                    <p>Записывайте абсолютно все свои траты в течение месяца.</p>
                </div>
                <div class="step-card">
                    <h2>Шаг 2. Правило 50/30/20</h2>
                    <p>50% дохода на нужды, 30% на желания и 20% на сбережения.</p>
                </div>
            `
        },
        en: {
            mainSub: "Manage your finances the smart way",
            back: "← Back to Calculator",
            menu_user: "User",
            menu_my_data: "👤 MY DATA",
            menu_lang: "Language",
            menu_settings: "Settings",
            menu_night_mode: "🌙 Night Mode",
            menu_terms: "📜 Terms of Use",
            privacy: "Privacy",
            reg_title: "📥 Registration",
            reg_name_ph: "Name",
            reg_email_ph: "Email",
            btn_save: "Save",
            btn_close: "Close",
            my_data_title: "👤 My Data",
            btn_ok: "OK",
            btn_clear: "Clear All",
            levels: ["Beginner 🥉", "Saver 🥈", "Finance Master 🥇", "Legendary Winner 🏆"],
            content: `
                <h1 class="post-title">💰 How to Start Saving from Scratch</h1>
                <p class="intro">Saving is a financial habit that can be built on almost any budget level.</p>
                <div class="step-card">
                    <h2>Step 1. Tracking</h2>
                    <p>Record every single expense for one month.</p>
                </div>
                <div class="step-card">
                    <h2>Step 2. 50/30/20 Rule</h2>
                    <p>50% needs, 30% wants, 20% savings.</p>
                </div>
            `
        }
    };

    function applyLanguage() {
        const lang = localStorage.getItem('lang') || 'am';
        const data = translations[lang];

        document.getElementById('mainSub').innerText = data.mainSub;
        document.getElementById('backBtn').innerText = data.back;
        document.getElementById('articleBody').innerHTML = data.content;
        
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (data[key]) el.innerText = data[key];
        });
        document.querySelectorAll('[data-placeholder]').forEach(el => {
            const key = el.getAttribute('data-placeholder');
            if (data[key]) el.placeholder = data[key];
        });

        const lvlIdx = parseInt(localStorage.getItem('finLevel')) || 0;
        const badge = document.getElementById('achievementBadge');
        const badgeText = document.getElementById('badgeText');
        if (lvlIdx > 0) {
            badge.style.display = 'flex';
            badgeText.innerText = data.levels[lvlIdx - 1];
        }
    }

    function changeLang(lang) {
        localStorage.setItem('lang', lang);
        applyLanguage();
        toggleLogoMenu();
    }

    function toggleLogoMenu() { document.getElementById('logoMenu').classList.toggle('show'); }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    function showUserData() {
        const savedName = localStorage.getItem('finSmartName');
        const savedEmail = localStorage.getItem('finSmartEmail');
        const contentDiv = document.getElementById('userDataContent');
        const actionDiv = document.getElementById('dynamicActionBtn');
        const lang = localStorage.getItem('lang') || 'am';
        const langData = translations[lang];
        toggleLogoMenu();
        if (savedName && savedEmail) {
            contentDiv.innerHTML = `<p><strong>${langData.reg_name_ph}:</strong> ${savedName}</p><p><strong>${langData.reg_email_ph}:</strong> ${savedEmail}</p>`;
            actionDiv.innerHTML = `<button onclick="clearAllData()" class="calc-btn" style="background:#d9534f; margin-top:10px;">${langData.btn_clear}</button>`;
            document.getElementById('userDataModal').style.display = 'block';
        } else {
            document.getElementById('regModal').style.display = 'block';
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function clearAllData() {
        if(confirm("Ջնջե՞լ տվյալները:")) {
            localStorage.clear();
            location.reload();
        }
    }

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        localStorage.setItem('finSmartName', document.getElementById('userName').value);
        localStorage.setItem('finSmartEmail', document.getElementById('userEmail').value);
        closeModal('regModal');
        alert("Գրանցումը հաջողվեց:");
    };

    window.onload = function() {
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        applyLanguage();
    };
</script>

</body>
</html>
