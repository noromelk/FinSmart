<!DOCTYPE html>
<html lang="hy">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8567583688178652"
     crossorigin="anonymous"></script>
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Գաղտնիության Քաղաքականություն - FinSmart Armenia</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5498044208644459" crossorigin="anonymous"></script>

    <style>
        :root { 
            --gold: #d4af37; 
            --dark: #1a1a1a; 
            --white: #ffffff; 
            --bg: #f4f7f6; 
            --text: #333;
            --card-bg: white;
        }

        body.dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --card-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text); 
            line-height: 1.8; 
            transition: background 0.3s, color 0.3s;
        }
        
        header { 
            background: var(--dark); 
            color: white; 
            text-align: center; 
            padding: 60px 20px; 
            border-bottom: 5px solid var(--gold); 
            position: relative;
        }

        .logo-container {
            position: absolute;
            top: 10px;
            left: 20px;
            cursor: pointer;
            z-index: 110;
        }

        .logo-svg {
            height: 65px;
            width: auto;
        }

        .settings-menu {
            display: none;
            position: absolute;
            top: 75px;
            left: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 100;
            width: 200px;
            overflow: hidden;
            border: 1px solid var(--gold);
            line-height: 1.4;
        }

        .settings-menu.show { display: block; animation: fadeIn 0.3s ease; }

        .settings-menu h4 {
            margin: 0; padding: 10px; font-size: 11px;
            text-transform: uppercase; color: var(--gold);
            background: rgba(0,0,0,0.05); text-align: left;
        }

        /* Ավելացված ոճ հղման համար */
        .settings-menu button, .settings-menu a {
            display: block; width: 100%; padding: 12px 15px;
            color: var(--text); text-decoration: none; font-size: 14px;
            background: none; border: none; text-align: left;
            cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: 0.2s;
            box-sizing: border-box;
            font-family: inherit;
        }

        .settings-menu button:hover, .settings-menu a:hover {
            background: var(--gold); color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-wrapper {
            max-width: 850px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }

        h2 {
            color: var(--dark);
            border-left: 4px solid var(--gold);
            padding-left: 15px;
            font-size: 20px;
            margin-top: 30px;
        }
        body.dark-mode h2 { color: var(--gold); }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background-color: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #b8962d;
            transform: translateX(-5px);
        }

        /* MODAL STYLES */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 35px; border-radius: 15px; max-width: 350px; text-align: center; border-top: 6px solid var(--gold); position: relative; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text); }
        .calc-btn { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .calc-btn:hover { background: #b8962d; }

        footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }

        @media (max-width: 600px) {
            header { padding: 90px 20px 30px; }
            .logo-container { left: 50%; transform: translateX(-50%); top: 10px; }
            .settings-menu { left: 50%; transform: translateX(-50%); top: 80px; }
            .content-wrapper { margin: 20px; padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container" onclick="toggleLogoMenu()">
        <svg class="logo-svg" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="rgb(26,26,26)"/>
            <g transform="translate(80, 50)">
              <rect x="0" y="55" width="16" height="30" rx="2" fill="white"/>
              <rect x="25" y="40" width="16" height="45" rx="2" fill="white"/>
              <rect x="50" y="20" width="16" height="65" rx="2" fill="white"/>
              <rect x="75" y="0" width="16" height="85" rx="2" fill="white"/>
              <path d="M -20 70 Q 30 110 95 65" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
              <path d="M -10 85 Q 40 65 90 5" stroke="#d4af37" stroke-width="6" fill="none" stroke-linecap="round"/>
              <path d="M 82 12 L 95 0 L 100 18 Z" fill="#d4af37"/>
            </g>
            <text x="200" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="60" fill="white">
              Fin<tspan fill="#d4af37">Smart</tspan>
            </text>
            <g transform="translate(200, 150)">
              <line x1="0" y1="-5" x2="60" y2="-5" stroke="#999" stroke-width="2"/>
              <text x="135" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#999" letter-spacing="5">ARMENIA</text>
              <line x1="210" y1="-5" x2="270" y2="-5" stroke="#999" stroke-width="2"/>
            </g>
        </svg>
    </div>

    <div id="logoMenu" class="settings-menu">
        <h4 data-key="menu_user">Օգտատեր</h4>
        <button onclick="showUserData()" data-key="menu_my_data">👤 ԻՄ ՏՎՅԱԼՆԵՐԸ</button>
        <h4 data-key="menu_lang">Լեզու / Language</h4>
        <button onclick="changeLang('am')">🇦🇲 ARMENIAN</button>
        <button onclick="changeLang('ru')">🇷🇺 RUSSIAN</button>
        <button onclick="changeLang('en')">🇺🇸 ENGLISH</button>
        <h4 data-key="menu_settings">Կարգավորումներ</h4>
        <button onclick="toggleDarkMode()" data-key="menu_night_mode">🌙 Գիշերային ռեժիմ</button>
        <a href="terms.html" data-key="menu_terms">📜 Օգտագործման պայմաններ</a>
    </div>

    <h1 id="headerTitle">Գաղտնիության Քաղաքականություն</h1>
</header>

<div class="content-wrapper">
    <div id="policyBody">
    </div>
    <a href="index.html" class="back-btn" id="backBtn">← Վերադառնալ գլխավոր էջ</a>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3 data-key="reg_title">📥 Գրանցում</h3>
        <form id="regForm">
            <input type="text" id="userName" placeholder="Անուն" data-placeholder="reg_name_ph" required>
            <input type="email" id="userEmail" placeholder="Էլ. հասցե" data-placeholder="reg_email_ph" required>
            <button type="submit" class="calc-btn" data-key="btn_save">Պահպանել</button>
        </form>
        <button onclick="closeModal('regModal')" style="background:none; color:gray; margin-top:15px; border:none; cursor:pointer;" data-key="btn_close">Փակել</button>
    </div>
</div>

<div id="userDataModal" class="modal">
    <div class="modal-content">
        <h3 data-key="my_data_title">👤 Իմ Տվյալները</h3>
        <div id="userDataContent" style="background: rgba(0,0,0,0.05); padding:15px; border-radius:8px; margin:15px 0; text-align:left;"></div>
        <button onclick="closeModal('userDataModal')" class="calc-btn" data-key="btn_ok">Լավ</button>
        <div id="dynamicActionBtn"></div>
    </div>
</div>

<footer>
    &copy; 2026 FinSmart Armenia
</footer>

<script>
    const translations = {
        am: {
            headerTitle: "Գաղտնիության Քաղաքականություն",
            back: "← Վերադառնալ գլխավոր էջ",
            menu_user: "Օգտատեր",
            menu_my_data: "👤 ԻՄ ՏՎՅԱԼՆԵՐԸ",
            menu_lang: "Լեզու / Language",
            menu_settings: "Կարգավորումներ",
            menu_night_mode: "🌙 Գիշերային ռեժիմ",
            menu_terms: "📜 Օգտագործման պայմաններ",
            reg_title: "📥 Գրանցում",
            reg_name_ph: "Անուն",
            reg_email_ph: "Էլ. հասցե",
            btn_save: "Պահպանել",
            btn_close: "Փակել",
            my_data_title: "👤 Իմ Տվյալները",
            btn_ok: "Լավ",
            btn_clear: "Ջնջել ամբողջը",
            content: `
                <h2>1. Ընդհանուր տեղեկություններ</h2>
                <p>FinSmart Armenia հարթակում մենք առաջնահերթություն ենք համարում մեր այցելուների գաղտնիությունը: Այս փաստաթուղթը պարունակում է տեղեկատվության տեսակների մասին, որոնք հավաքվում և գրանցվում են մեր կողմից:</p>
                <h2>2. Լոգ ֆայլեր (Log Files)</h2>
                <p>Մենք հետևում ենք լոգ ֆայլերի օգտագործման ստանդարտ ընթացակարգին: Այս ֆայլերը գրանցում են այցելուների տվյալները (IP հասցե, բրաուզերի տեսակ, ժամանակ):</p>
                <h2>3. Google DoubleClick DART Cookie</h2>
                <p>Google-ը օգտագործում է cookies մեր կայքի այցելուներին գովազդներ ցուցադրելու համար՝ հիմնվելով նրանց նախկին այցելությունների վրա:</p>
                <h2>4. Տվյալների պահպանում</h2>
                <p>Ձեր ֆինանսական տվյալները (եկամուտ, ծախս) չեն ուղարկվում սերվեր: Դրանք պահվում են միայն ձեր սարքի LocalStorage-ում:</p>
            `
        },
        ru: {
            headerTitle: "Политика конфиденциальности",
            back: "← На главную",
            menu_user: "Пользователь",
            menu_my_data: "👤 МОИ ДАННЫЕ",
            menu_lang: "Язык",
            menu_settings: "Настройки",
            menu_night_mode: "🌙 Ночной режим",
            menu_terms: "📜 Условия использования",
            reg_title: "📥 Регистрация",
            reg_name_ph: "Имя",
            reg_email_ph: "Эл. почта",
            btn_save: "Сохранить",
            btn_close: "Закрыть",
            my_data_title: "👤 Мои данные",
            btn_ok: "Ок",
            btn_clear: "Удалить всё",
            content: `
                <h2>1. Общая информация</h2>
                <p>На платформе FinSmart Armenia мы уделяем приоритетное внимание конфиденциальности наших посетителей.</p>
                <h2>2. Лог-файлы (Log Files)</h2>
                <p>Мы используем стандартные лог-файлы для анализа трафика (IP-адреса, типы браузеров, время посещения).</p>
                <h2>3. Google DoubleClick DART Cookie</h2>
                <p>Google использует файлы cookie для показа объявлений пользователям на основе их посещений нашего и других сайтов.</p>
                <h2>4. Хранение данных</h2>
                <p>Ваши финансовые расчеты не передаются на сервер. Они хранятся локально в вашем браузере (LocalStorage).</p>
            `
        },
        en: {
            headerTitle: "Privacy Policy",
            back: "← Back to Home",
            menu_user: "User",
            menu_my_data: "👤 MY DATA",
            menu_lang: "Language",
            menu_settings: "Settings",
            menu_night_mode: "🌙 Night Mode",
            menu_terms: "📜 Terms of Use",
            reg_title: "📥 Registration",
            reg_name_ph: "Name",
            reg_email_ph: "Email",
            btn_save: "Save",
            btn_close: "Close",
            my_data_title: "👤 My Data",
            btn_ok: "OK",
            btn_clear: "Clear All",
            content: `
                <h2>1. General Information</h2>
                <p>At FinSmart Armenia, one of our main priorities is the privacy of our visitors.</p>
                <h2>2. Log Files</h2>
                <p>We follow a standard procedure of using log files (IP addresses, browser type, date and time stamps).</p>
                <h2>3. Google DoubleClick DART Cookie</h2>
                <p>Google uses cookies to serve ads to our site visitors based on their visit to our site and other sites on the internet.</p>
                <h2>4. Data Storage</h2>
                <p>Your financial data is not stored on our servers. All calculations are stored locally in your browser's LocalStorage.</p>
            `
        }
    };

    function applyLanguage() {
        const lang = localStorage.getItem('lang') || 'am';
        const data = translations[lang];

        document.getElementById('headerTitle').innerText = data.headerTitle;
        document.getElementById('backBtn').innerText = data.back;
        document.getElementById('policyBody').innerHTML = data.content;
        
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (data[key]) el.innerText = data[key];
        });
        document.querySelectorAll('[data-placeholder]').forEach(el => {
            const key = el.getAttribute('data-placeholder');
            if (data[key]) el.placeholder = data[key];
        });
    }

    function changeLang(lang) {
        localStorage.setItem('lang', lang);
        applyLanguage();
        toggleLogoMenu();
    }

    function toggleLogoMenu() { document.getElementById('logoMenu').classList.toggle('show'); }
    
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    function showUserData() {
        const savedName = localStorage.getItem('finSmartName');
        const savedEmail = localStorage.getItem('finSmartEmail');
        const contentDiv = document.getElementById('userDataContent');
        const actionDiv = document.getElementById('dynamicActionBtn');
        const lang = localStorage.getItem('lang') || 'am';
        const langData = translations[lang];

        toggleLogoMenu();

        if (savedName && savedEmail) {
            contentDiv.innerHTML = `<p><strong>${langData.reg_name_ph}:</strong> ${savedName}</p><p><strong>${langData.reg_email_ph}:</strong> ${savedEmail}</p>`;
            actionDiv.innerHTML = `<button onclick="clearAllData()" class="calc-btn" style="background:#d9534f; margin-top:10px;">${langData.btn_clear}</button>`;
            document.getElementById('userDataModal').style.display = 'block';
        } else {
            document.getElementById('regModal').style.display = 'block';
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function clearAllData() {
        const lang = localStorage.getItem('lang') || 'am';
        const confirmMsg = lang === 'am' ? "Ջնջե՞լ տվյալները:" : (lang === 'ru' ? "Удалить данные?" : "Clear data?");
        if(confirm(confirmMsg)) {
            localStorage.removeItem('finSmartName');
            localStorage.removeItem('finSmartEmail');
            location.reload();
        }
    }

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        localStorage.setItem('finSmartName', document.getElementById('userName').value);
        localStorage.setItem('finSmartEmail', document.getElementById('userEmail').value);
        closeModal('regModal');
        const lang = localStorage.getItem('lang') || 'am';
        alert(lang === 'am' ? "Գրանցումը հաջողվեց:" : (lang === 'ru' ? "Регистрация прошла успешно!" : "Registration successful!"));
    };

    window.onclick = function(e) {
        if (!e.target.closest('.logo-container') && !e.target.closest('.modal-content') && !e.target.closest('.settings-menu')) {
            document.getElementById('logoMenu').classList.remove('show');
        }
    };

    window.onload = function() {
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        applyLanguage();
    };
</script>

</body>
</html>
